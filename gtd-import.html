<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTD Task Importer</title>
<style>
  body { font-family: monospace; background: #0f0f1a; color: #e8e8f0; padding: 2rem; max-width: 700px; margin: 0 auto; }
  h1 { color: #7c6af7; font-size: 1.4rem; margin-bottom: 0.25rem; }
  .sub { color: #8080aa; font-size: 0.8rem; margin-bottom: 2rem; }
  .card { background: #1a1a2e; border: 1px solid #2e2e50; border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
  label { font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; color: #8080aa; display: block; margin-bottom: 0.35rem; }
  input { width: 100%; background: #222238; border: 1px solid #2e2e50; border-radius: 8px; padding: 0.75rem 1rem; color: #e8e8f0; font-family: monospace; font-size: 0.83rem; outline: none; box-sizing: border-box; }
  input:focus { border-color: #7c6af7; }
  button { background: #7c6af7; color: #fff; border: none; border-radius: 8px; padding: 0.85rem; font-family: monospace; font-size: 0.83rem; cursor: pointer; width: 100%; margin-top: 0.5rem; box-shadow: 0 4px 20px rgba(124,106,247,0.3); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #log { background: #222238; border: 1px solid #2e2e50; border-radius: 8px; padding: 1rem; font-size: 0.75rem; line-height: 1.8; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
  .ok { color: #6af7c2; }
  .err { color: #f87171; }
  .info { color: #8080aa; }
  .progress { background: #2e2e50; border-radius: 4px; height: 6px; margin: 1rem 0; }
  .progress-bar { background: linear-gradient(90deg, #7c6af7, #6af7c2); height: 6px; border-radius: 4px; transition: width 0.3s; width: 0%; }
</style>
</head>
<body>
<h1>GTD Task Importer</h1>
<div class="sub">One-time import of 45 Obsidian tasks → GTD Tasks sheet</div>

<div class="card">
  <label>OAuth Client ID</label>
  <input type="text" id="clientId" placeholder="xxxx.apps.googleusercontent.com" />
  <button onclick="startImport()" id="btn">Authorise & Import 45 Tasks</button>
</div>

<div class="progress"><div class="progress-bar" id="bar"></div></div>
<div id="log" class="info">Ready. Enter your Client ID and click import.</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const SHEET_ID = '1RhIJLd9Z8AJhMINUm8BntdlHIvbsRsP94RPv5I3rzFk';
const SHEET_NAME = 'Tasks';

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

const TASKS = [
  ["Make an eye appointment for Owen","Next Actions","Owen","2026-04-23","","","active",uid()],
  ["Replace Anode on hot water tank","Next Actions","Home Maintenance","2026-05-01","","","active",uid()],
  ["Ask about future Jiu Jitsu tournaments","Waiting For","Owen","2026-04-20","","Emailed Tyson to get on mailing list","active",uid()],
  ["Take l-theanine in morning","Inbox","","2026-04-26","","","active",uid()],
  ["$140 for Anastasia (cleaner)","Inbox","Home Maintenance","2026-04-28","","","active",uid()],
  ["Shred papers on credenza","Inbox","Home Maintenance","","","","active",uid()],
  ["See email re car maintenance and plan it","Inbox","Home Maintenance","2026-05-02","","","active",uid()],
  ["Sharpen knives","Inbox","Home Maintenance","","","","active",uid()],
  ["Clean cpap machine and change filter","Inbox","Home Maintenance","2026-04-11","","","active",uid()],
  ["Clean CPAP weekly","Inbox","Home Maintenance","","","","active",uid()],
  ["Fix up water damage on ceiling","Inbox","Home Maintenance","2026-09-01","","","active",uid()],
  ["Find and centralize plumbing supplies in basement","Inbox","Home Maintenance","","","","active",uid()],
  ["Dry under fridge bin","Inbox","Home Maintenance","","","","active",uid()],
  ["Windows: check Window Mart emails and add calendar entries","Inbox","","","","","active",uid()],
  ["Owen birthday gift new oilers hat","Inbox","Owen","","","","active",uid()],
  ["Owen wants a new oilers hat (don't lose it)","Inbox","Owen","","","","active",uid()],
  ["Use Owen's bank card at machine to keep active","Inbox","Owen","","","","active",uid()],
  ["Soccer jersey coach Drew","Inbox","","2026-04-19","","","active",uid()],
  ["Moon road - add to reading list","Inbox","","","","","active",uid()],
  ["Plan trips","Inbox","","","","","active",uid()],
  ["KOA reservation - Hinton/Jasper","Inbox","","2026-06-12","","Confirmation #21579551","active",uid()],
  ["Purge file cabinet top drawer","Inbox","Home Maintenance","","","","active",uid()],
  ["Return or donate puppy food in garage","Inbox","","","","","active",uid()],
  ["Time to detox brain meds","Inbox","","","","","active",uid()],
  ["Can I make a dataview using the file name it is embedded in?","Inbox","GTD System","","","","active",uid()],
  ["Toggle to to-do status with checkbox in Obsidian","Inbox","GTD System","","","","active",uid()],
  ["Obsidian semantic tool (reddit post)","Inbox","GTD System","","","","active",uid()],
  ["Search email for info@audiotools.se and install ADHD leveler","Inbox","Music Production","","","","active",uid()],
  ["Check out Labs by Spitfire","Inbox","Music Production","","","","active",uid()],
  ["Think of a song like a meal in terms of structure","Inbox","Music Production","","","","active",uid()],
  ["Research slant/imperfect rhymes (b-rhymes.com, rhyme zone)","Inbox","Music Production","","","","active",uid()],
  ["Make a list of favorite samples","Inbox","Music Production","","","","active",uid()],
  ["Lo-fi 2 tutorial","Inbox","Music Production","","https://youtube.com/watch?v=8Njry14FFDA","","active",uid()],
  ["Pentatonic scale pattern (YouTube)","Inbox","Music Production","","https://youtube.com/shorts/yaWaApgBDts","","active",uid()],
  ["Check out Focusrite software library","Inbox","Music Production","","https://id.focusritegroup.com/en/my-software","","active",uid()],
  ["Music idea: Sample Mr Burns 'you little rapscallion'","Inbox","Music Production","","","","active",uid()],
  ["Sample Dennis Hopper from Apocalypse Now for new track","Inbox","Music Production","","","","active",uid()],
  ["Sample doors lyrics","Inbox","Music Production","","","","active",uid()],
  ["New project recording: b1 p1, S2 p10","Inbox","Music Production","","","","active",uid()],
  ["Dinner: roast chicken, mushroom pasta, pesto, green salad","Inbox","Meals","","","","active",uid()],
  ["Asparagus and edamame dinner salad","Inbox","Meals","","https://www.instagram.com/reel/DWeTT1zj3GB/","","active",uid()],
  ["Chicken shawarma rice dish","Inbox","Meals","","","","active",uid()],
  ["Chicken and rice meal idea","Inbox","Meals","","https://www.instagram.com/reel/DVRbrUuCKyq/","","active",uid()],
  ["Watch: The Castle","Inbox","","","","","active",uid()],
  ["Go through task list and designate one task to do after work","Inbox","","","","","active",uid()],
];

let tokenClient, accessToken;

function log(msg, cls='info') {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

function setProgress(pct) {
  document.getElementById('bar').style.width = pct + '%';
}

async function sheetsAppend(row) {
  const range = encodeURIComponent(`${SHEET_NAME}!A:H`);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS&access_token=${accessToken}`;
  const r = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ values: [row] })
  });
  return r.ok;
}

async function ensureHeaders() {
  const range = encodeURIComponent(`${SHEET_NAME}!A1:H1`);
  const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?access_token=${accessToken}`);
  const d = await r.json();
  if ((d.values || [[]])[0]?.[0]) return;
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(`${SHEET_NAME}!A1:H1`)}?valueInputOption=USER_ENTERED&access_token=${accessToken}`;
  await fetch(url, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ values: [['Task','List','Project','Due','DocURL','Notes','Status','ID']] })
  });
}

async function doImport() {
  document.getElementById('btn').disabled = true;
  document.getElementById('log').innerHTML = '';
  log(`Starting import of ${TASKS.length} tasks...`);
  
  await ensureHeaders();
  log('Headers confirmed ✓', 'ok');

  let ok = 0, fail = 0;
  for (let i = 0; i < TASKS.length; i++) {
    const t = TASKS[i];
    const success = await sheetsAppend(t);
    if (success) {
      ok++;
      log(`✓ [${t[1]}] ${t[0]}`, 'ok');
    } else {
      fail++;
      log(`✗ Failed: ${t[0]}`, 'err');
    }
    setProgress(((i+1) / TASKS.length) * 100);
    await new Promise(r => setTimeout(r, 200)); // rate limit
  }

  log(`\nDone! ${ok} imported, ${fail} failed.`, ok === TASKS.length ? 'ok' : 'err');
  document.getElementById('btn').disabled = false;
}

function startImport() {
  const clientId = document.getElementById('clientId').value.trim();
  if (!clientId) { alert('Please enter your OAuth Client ID'); return; }
  
  if (accessToken) { doImport(); return; }

  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: 'https://www.googleapis.com/auth/spreadsheets',
    callback: resp => {
      if (resp.access_token) {
        accessToken = resp.access_token;
        log('Authorised ✓', 'ok');
        doImport();
      } else {
        log('Auth failed', 'err');
      }
    }
  });
  tokenClient.requestAccessToken();
}
</script>
</body>
</html>
